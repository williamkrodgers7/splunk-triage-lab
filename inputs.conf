
# Splunk Universal Forwarder Data Engineering Optimization Configuration
# Target Host Deployment: Windows 10 Pro / Windows 11 Workstations
# Purpose: Suppress high-volume, low-fidelity background noise to preserve 16GB RAM constraint

[WinEventLog://Security]
disabled = 0
start_from = oldest
current_only = 0
evt_resolve_ad_obj = 1
checkpointInterval = 5
renderXml = false
index = windows_logs

# Active Ingestion-Layer Filtering (False-Positive Noise Suppression)
# Drops massive object-access loop events at the source before indexing serialization
blacklist1 = EventCode="4662" Message="Object Access"
blacklist2 = EventCode="4656" Message="A handle to an object was requested"
blacklist3 = EventCode="4690" Message="An attempt was made to duplicate a handle to an object"

[WinEventLog://Microsoft-Windows-Sysmon/Operational]
disabled = 0
renderXml = true
index = sysmon_telemetry
