# Splunk Forwarder Optimization Configuration
# Deployed to local Windows endpoints to preserve 16GB RAM constraints

[WinEventLog://Security]
disabled = 0
start_from = oldest
current_only = 0
evt_resolve_ad_obj = 1
checkpointInterval = 5
renderXml = false
index = windows

# Active False-Positive Suppression at Ingestion Layer
# Drops massive, noisy object access and detailed tracking events to protect indexer performance
blacklist1 = EventCode="4662" Message="Object Access"
blacklist2 = EventCode="4656" Message="A handle to an object was requested"
blacklist3 = EventCode="4690" Message="An attempt was made to duplicate a handle to an object"
